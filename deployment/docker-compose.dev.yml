
name: template-project

services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  api:
    build: ../api
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://root:password@mongo:27017/?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-risktool}
      API_DEV_MODE: ${API_DEV_MODE:-true}
      API_DEV_USER_ID: ${API_DEV_USER_ID:-dev-user}
      API_DEV_USERNAME: ${API_DEV_USERNAME:-dev}
      API_DEV_EMAIL: ${API_DEV_EMAIL:-dev@example.com}
      API_DEV_IS_ADMIN: ${API_DEV_IS_ADMIN:-true}
    ports:
      - "8000:80"
    depends_on:
      - mongo
  web:
    build:
      context: ../web
      args:
        BUILD_NPM_TOKEN: ${BUILD_NPM_TOKEN}
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_STANDALONE_MODE: ${NEXT_PUBLIC_STANDALONE_MODE:-true}
        NEXT_PUBLIC_SIDEBAR_DEV_MODE: ${NEXT_PUBLIC_SIDEBAR_DEV_MODE:-true}
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_STANDALONE_MODE: ${NEXT_PUBLIC_STANDALONE_MODE:-true}
      NEXT_PUBLIC_SIDEBAR_DEV_MODE: ${NEXT_PUBLIC_SIDEBAR_DEV_MODE:-true}
      NEXT_PUBLIC_ENABLE_VERCEL_ANALYTICS: "false"
    depends_on:
      - api
  ai-service:
    build: ../ai-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    ports:
      - "8100:80"

  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - ai-service

volumes:
  mongo_data:
